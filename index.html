<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Union Store - Automated License & Panel Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 9999px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col antialiased selection:bg-blue-600 selection:text-white">

    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div id="app-container" class="flex-1 flex flex-col relative max-w-md mx-auto w-full bg-gray-950 shadow-2xl overflow-hidden border-x border-gray-900">
    </div>

    <div id="modal-backdrop" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center sm:p-4 transition-all">
        <div id="modal-box" class="w-full sm:max-w-md bg-gray-900 border border-gray-800 rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden max-h-[85vh] flex flex-col transform transition-transform translate-y-full sm:translate-y-0 sm:scale-95">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, get, child } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'union-store-realtime-db-app';
        // ✅ Firebase Config (New Firebase - Realtime Database)
        const firebaseConfig = {
            apiKey: "AIzaSyDXt6OT91TO1VQxjFHXMubQvVCYM04qQLM",
            authDomain: "union-store-a1c51.firebaseapp.com",
            databaseURL: "https://union-store-a1c51-default-rtdb.firebaseio.com",
            projectId: "union-store-a1c51",
            storageBucket: "union-store-a1c51.firebasestorage.app",
            messagingSenderId: "93515621494",
            appId: "1:93515621494:web:92bcb5a27b8a9694652b57",
            measurementId: "G-MEXQX7ZJ5F"
        };

        let app, db, auth;
        let isCloudActive = false;

        const defaultInitialData = {
            
            products: [
                {
                    id: 'prod_1',
                    name: 'APEX VIP ROOT PANEL',
                    category: 'android_root',
                    plans: [
                        { duration: '7 Days', price: 299, resellerPrice: 200, stock: 45 },
                        { duration: '30 Days', price: 799, resellerPrice: 600, stock: 120 }
                    ]
                },
                {
                    id: 'prod_2',
                    name: 'CYBER NON-ROOT ESP',
                    category: 'android_non_root',
                    plans: [
                        { duration: '15 Days', price: 499, resellerPrice: 350, stock: 80 },
                        { duration: 'Monthly', price: 1199, resellerPrice: 900, stock: 50 }
                    ]
                },
                {
                    id: 'prod_3',
                    name: 'ZERO-DAY IOS IPA',
                    category: 'ios',
                    plans: [
                        { duration: '30 Days', price: 999, resellerPrice: 750, stock: 30 }
                    ]
                }
            ],
            files: [
                { id: 'file_1', name: 'Apex Root APK v5.4', description: 'Latest optimized root panel build', url: '#', date: '2026-06-06' },
                { id: 'file_2', name: 'Cyber Non-Root Loader v3.1', description: 'Safe bypass loader for non-root devices', url: '#', date: '2026-06-06' },
                { id: 'file_3', name: 'iOS IPA Enterprise Cert v2.0', description: 'Signed IPA for direct Sideloading', url: '#', date: '2026-06-06' }
            ],
            coupons: [
                { id: 'coup_1', code: 'UNION10', discount: 10 },
                { id: 'coup_2', code: 'VIP20', discount: 20 }
            ],
            announcements: [
                { id: 'ann_1', text: '🔥 Welcome to Union Store! Real-time Firebase database cloud sync active 24/7.', date: '2026-06-06' }
            ],
            orders: [],
            balanceReqs: [],
            settings: { 
                upiId: 'unionstore@upi',
                supportText: 'Official Union Store Telegram Support: @ownerxunion',
                storeLogo: ''
            }
        };

        let cloudData = JSON.parse(JSON.stringify(defaultInitialData));
        let currentUser = null;
        let currentTab = 'auth';
        let selectedProduct = null;
        let selectedPlanIndex = 0;
        let appliedCoupon = null;
        let selectedCategoryFilter = 'all';
        let uploadedFileDataUrl = '';

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const t = document.createElement('div');
            t.className = `px-4 py-3 rounded-2xl text-xs font-bold shadow-2xl border transition-all transform translate-y-2 opacity-0 flex items-center gap-2.5 pointer-events-auto ${type === 'success' ? 'bg-green-950/90 border-green-500/30 text-green-200' : 'bg-red-950/90 border-red-500/30 text-red-200'}`;
            t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle text-green-400' : 'fa-exclamation-circle text-red-400'}"></i> ${msg}`;
            container.appendChild(t);
            setTimeout(() => { t.classList.remove('translate-y-2', 'opacity-0'); }, 10);
            setTimeout(() => {
                t.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => t.remove(), 300);
            }, 3000);
        };

        window.generateId = () => '_' + Math.random().toString(36).substr(2, 9);

        const CloudDB = {
            getUsers: () => cloudData.users || [],
            updateUsers: async (users) => { cloudData.users = users; await persistCloud(); render(); },
            getProducts: () => cloudData.products || [],
            updateProducts: async (products) => { cloudData.products = products; await persistCloud(); render(); },
            getFiles: () => cloudData.files || [],
            addFile: async (file) => { if(!cloudData.files) cloudData.files = []; cloudData.files.unshift(file); await persistCloud(); render(); },
            deleteFile: async (id) => { if(cloudData.files) cloudData.files = cloudData.files.filter(f => f.id !== id); await persistCloud(); render(); },
            getCoupons: () => cloudData.coupons || [],
            addCoupon: async (coup) => { if(!cloudData.coupons) cloudData.coupons = []; cloudData.coupons.push(coup); await persistCloud(); render(); },
            deleteCoupon: async (id) => { if(cloudData.coupons) cloudData.coupons = cloudData.coupons.filter(c => c.id !== id); await persistCloud(); render(); },
            getAnnouncements: () => cloudData.announcements || [],
            addAnnouncement: async (ann) => { if(!cloudData.announcements) cloudData.announcements = []; cloudData.announcements.unshift(ann); await persistCloud(); render(); },
            deleteAnnouncement: async (id) => { if(cloudData.announcements) cloudData.announcements = cloudData.announcements.filter(a => a.id !== id); await persistCloud(); render(); },
            getOrders: () => cloudData.orders || [],
            addOrder: async (order) => { if(!cloudData.orders) cloudData.orders = []; cloudData.orders.unshift(order); await persistCloud(); render(); },
            updateOrder: async (id, changes) => {
                const o = cloudData.orders.find(x => x.id === id);
                if(o) { Object.assign(o, changes); await persistCloud(); render(); }
            },
            getBalanceReqs: () => cloudData.balanceReqs || [],
            addBalanceReq: async (req) => { if(!cloudData.balanceReqs) cloudData.balanceReqs = []; cloudData.balanceReqs.unshift(req); await persistCloud(); render(); },
            updateBalanceReq: async (id, changes) => {
                const r = cloudData.balanceReqs.find(x => x.id === id);
                if(r) { Object.assign(r, changes); await persistCloud(); render(); }
            },
            getSettings: () => cloudData.settings || { upiId: 'unionstore@upi', supportText: 'Support @ownerxunion', storeLogo: '' },
            updateSettings: async (set) => { cloudData.settings = set; await persistCloud(); render(); }
        };

        async function initCloud() {
            try {
                if (typeof firebaseConfig !== 'undefined' && Object.keys(firebaseConfig).length > 0) {
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getDatabase(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    isCloudActive = true;
                    const dbRef = ref(db, 'artifacts/' + appId + '/public/data/store_realtime_state');
                    
                    onValue(dbRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data && data.users) {
                            cloudData = data;
                        } else {
                            set(dbRef, cloudData).catch(() => {});
                        }
                        syncLocalUser();
                        render();
                    }, (error) => {
                        console.warn('Realtime database sync error:', error.message);
                        isCloudActive = false;
                        render();
                    });
                } else {
                    console.warn('Firebase config missing; running in local mode.');
                }
            } catch (e) {
                console.warn('Cloud init notice:', e);
                isCloudActive = false;
            }

            syncLocalUser();
            render();
        }

        async function persistCloud() {
            if (isCloudActive && db) {
                try {
                    const dbRef = ref(db, 'artifacts/' + appId + '/public/data/store_realtime_state');
                    await set(dbRef, cloudData);
                } catch(e) {
                    console.warn('Persist notice:', e.message);
                }
            }
        }

        function syncLocalUser() {
            if (currentUser && cloudData && cloudData.users) {
                const fresh = cloudData.users.find(u => u.id === currentUser.id);
                if (fresh) currentUser = fresh;
            }
        }

        window.render = () => {
            const container = document.getElementById('app-container');
            if(!container) return;

            if(!currentUser) {
                container.innerHTML = renderAuth();
                return;
            }

            const settings = CloudDB.getSettings();

            container.innerHTML = `
                <header class="bg-gray-950 border-b border-gray-900 px-5 py-4 flex justify-between items-center sticky top-0 z-20">
                    <div class="flex items-center gap-2.5">
                        <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-sm shadow-lg shadow-blue-600/30 overflow-hidden">
                            ${settings.storeLogo ? `<img src="${settings.storeLogo}" class="w-full h-full object-cover">` : '<i class="fas fa-shield-alt"></i>'}
                        </div>
                        <div>
                            <h1 class="font-extrabold text-sm tracking-wide text-white uppercase">Union Store</h1>
                            <span class="text-[9px] text-green-400 font-semibold flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span> Cloud RTDB Active
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="bg-gray-900 border border-gray-800 px-3 py-1.5 rounded-2xl flex items-center gap-2">
                            <i class="fas fa-wallet text-green-400 text-xs"></i>
                            <span class="text-xs font-bold text-white">₹${currentUser.balance}</span>
                        </div>
                    </div>
                </header>

                <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-4">
                    ${currentTab === 'store' ? renderStore() : ''}
                    ${currentTab === 'history' ? renderHistory() : ''}
                    ${currentTab === 'files' ? renderFiles() : ''}
                    ${currentTab === 'account' ? renderAccount() : ''}
                </main>

                <nav class="absolute bottom-0 left-0 right-0 bg-gray-950/95 backdrop-blur-md border-t border-gray-900 px-6 py-2.5 flex justify-between items-center z-20 pb-safe">
                    <button onclick="switchTab('store')" class="flex flex-col items-center gap-1 transition-colors ${currentTab === 'store' ? 'text-blue-500' : 'text-gray-500 hover:text-gray-300'}">
                        <i class="fas fa-store text-sm"></i>
                        <span class="text-[10px] font-bold">Store</span>
                    </button>
                    <button onclick="switchTab('history')" class="flex flex-col items-center gap-1 transition-colors ${currentTab === 'history' ? 'text-blue-500' : 'text-gray-500 hover:text-gray-300'}">
                        <i class="fas fa-history text-sm"></i>
                        <span class="text-[10px] font-bold">History</span>
                    </button>
                    <button onclick="switchTab('files')" class="flex flex-col items-center gap-1 transition-colors ${currentTab === 'files' ? 'text-blue-500' : 'text-gray-500 hover:text-gray-300'}">
                        <i class="fas fa-download text-sm"></i>
                        <span class="text-[10px] font-bold">Files</span>
                    </button>
                    <button onclick="switchTab('account')" class="flex flex-col items-center gap-1 transition-colors ${currentTab === 'account' ? 'text-blue-500' : 'text-gray-500 hover:text-gray-300'}">
                        <i class="fas fa-user text-sm"></i>
                        <span class="text-[10px] font-bold">Account</span>
                    </button>
                </nav>
            `;
        };

        window.switchTab = (tab) => {
            currentTab = tab;
            render();
        };

        const renderAuth = () => `
            <div class="flex-1 flex flex-col justify-center p-6 space-y-6 my-auto">
                <div class="text-center space-y-2">
                    <div class="w-16 h-16 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white text-2xl shadow-xl shadow-blue-600/30">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h2 class="text-xl font-black tracking-tight text-white uppercase">Union Store</h2>
                    <p class="text-xs text-gray-400">Automated License & Panel Shop</p>
                </div>

                <div class="bg-gray-900 border border-gray-800 rounded-3xl p-5 space-y-4 shadow-xl">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider">Username</label>
                        <input type="text" id="auth-username" class="w-full bg-gray-950 border border-gray-800 rounded-2xl px-4 py-3 text-white text-xs focus:outline-none focus:border-blue-500" placeholder="Enter username">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider">Password</label>
                        <input type="password" id="auth-password" class="w-full bg-gray-950 border border-gray-800 rounded-2xl px-4 py-3 text-white text-xs focus:outline-none focus:border-blue-500" placeholder="Enter password">
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <button onclick="showForgotPasswordModal()" class="text-blue-400 hover:underline font-semibold">Forgot Password?</button>
                        <button onclick="showSupportModal()" class="text-green-400 hover:underline font-semibold flex items-center gap-1">
                            <i class="fas fa-headset"></i> Support
                        </button>
                    </div>
                    <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-2xl text-xs uppercase tracking-wider shadow-lg shadow-blue-600/20 cursor-pointer">Sign In</button>
                    <button onclick="showRegisterModal()" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 rounded-2xl text-xs uppercase tracking-wider cursor-pointer">Create New Account</button>
                </div>

                <div class="text-center">
                    <p class="text-xs text-gray-500">Only Owner can create reseller accounts. New users can create buyer accounts.</p>
                </div>
            </div>
        `;

        const renderStore = () => {
            const allProducts = CloudDB.getProducts();
            const announcements = CloudDB.getAnnouncements();
            const products = selectedCategoryFilter === 'all' ? allProducts : allProducts.filter(p => p.category === selectedCategoryFilter);

            return `
                <div class="space-y-5">
                    ${announcements.length > 0 ? `
                        <div class="space-y-2">
                            ${announcements.map(a => `
                                <div class="bg-gradient-to-r from-yellow-950/50 to-amber-950/50 border border-yellow-500/30 p-3.5 rounded-2xl flex items-center gap-3 shadow-md">
                                    <div class="w-8 h-8 rounded-xl bg-yellow-500/10 border border-yellow-500/20 flex items-center justify-center text-yellow-400 shrink-0 text-xs">
                                        <i class="fas fa-bullhorn"></i>
                                    </div>
                                    <div class="flex-1 text-xs text-yellow-200 font-medium">
                                        ${a.text}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    <div class="bg-gradient-to-r from-blue-900/40 to-indigo-900/40 border border-blue-500/20 p-4 rounded-3xl flex justify-between items-center shadow-lg">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-blue-600/30 border border-blue-500/40 rounded-2xl overflow-hidden flex items-center justify-center text-white">
                                ${currentUser.avatar ? `<img src="${currentUser.avatar}" class="w-full h-full object-cover">` : '<i class="fas fa-user text-lg"></i>'}
                            </div>
                            <div>
                                <span class="text-[10px] uppercase font-bold text-blue-400 tracking-wider">Welcome Back</span>
                                <h2 class="text-sm font-bold text-white">${currentUser.username} (${currentUser.role.toUpperCase()})</h2>
                            </div>
                        </div>
                        <div class="bg-gray-950/80 border border-gray-800 px-3.5 py-2 rounded-2xl text-right">
                            <span class="text-[9px] uppercase font-bold text-gray-400 block">Balance</span>
                            <span class="text-xs font-bold text-green-400">₹${currentUser.balance}</span>
                        </div>
                    </div>

                    <!-- Category Selector Tabs -->
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="setCategoryFilter('all')" class="py-2.5 px-2 rounded-2xl text-[11px] font-bold uppercase transition-all ${selectedCategoryFilter === 'all' ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30' : 'bg-gray-900 text-gray-400 border border-gray-800'}">All</button>
                        <button onclick="setCategoryFilter('android_root')" class="py-2.5 px-2 rounded-2xl text-[11px] font-bold uppercase transition-all ${selectedCategoryFilter === 'android_root' ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30' : 'bg-gray-900 text-gray-400 border border-gray-800'}">Root</button>
                        <button onclick="setCategoryFilter('android_non_root')" class="py-2.5 px-2 rounded-2xl text-[11px] font-bold uppercase transition-all ${selectedCategoryFilter === 'android_non_root' ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30' : 'bg-gray-900 text-gray-400 border border-gray-800'}">Non-Root</button>
                        <button onclick="setCategoryFilter('ios')" class="py-2.5 px-2 rounded-2xl text-[11px] font-bold uppercase transition-all ${selectedCategoryFilter === 'ios' ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30' : 'bg-gray-900 text-gray-400 border border-gray-800'}">iOS</button>
                    </div>

                    <div class="space-y-3.5">
                        ${products.length === 0 ? '<div class="text-center py-12 text-gray-500 text-xs">No products found in this category.</div>' :
                          products.map(p => `
                            <div class="bg-gray-900 border border-gray-800 rounded-3xl p-4 space-y-3 hover:border-gray-700 transition-colors shadow-md">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <span class="text-[9px] font-bold px-2 py-0.5 rounded-full bg-blue-950 text-blue-400 border border-blue-800/45 uppercase">${p.category ? p.category.replace('_', ' ') : 'panel'}</span>
                                        <h4 class="font-bold text-white text-sm mt-1">${p.name}</h4>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-[10px] text-gray-400">Starting at</span>
                                        <div class="text-xs font-bold text-green-400">₹${currentUser.role === 'reseller' ? (p.plans[0]?.resellerPrice || 0) : (p.plans[0]?.price || 0)}</div>
                                    </div>
                                </div>
                                <div class="space-y-2 pt-1">
                                    ${p.plans.map((pl, idx) => `
                                        <div class="flex justify-between items-center bg-gray-950 p-2.5 rounded-2xl border border-gray-800/80">
                                            <div>
                                                <span class="text-xs font-bold text-white">${pl.duration}</span>
                                                <span class="text-[10px] text-gray-400 ml-2">Stock: ${pl.stock}</span>
                                            </div>
                                            <div class="flex items-center gap-2">
                                                <span class="text-xs font-bold text-white">₹${currentUser.role === 'reseller' ? pl.resellerPrice : pl.price}</span>
                                                <button onclick="openCheckout('${p.id}', ${idx})" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-xl text-xs font-bold shadow-md shadow-blue-600/20 transition-colors cursor-pointer">Buy</button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        window.setCategoryFilter = (cat) => {
            selectedCategoryFilter = cat;
            render();
        };

        const renderHistory = () => {
            const orders = CloudDB.getOrders().filter(o => o.userId === currentUser.id || currentUser.role === 'owner');
            return `
                <div class="space-y-4">
                    <h2 class="text-xs font-bold text-gray-300 uppercase tracking-wider">All History & Orders (${orders.length})</h2>
                    <div class="space-y-3">
                        ${orders.length === 0 ? '<div class="text-center py-12 text-gray-500 text-xs">No orders placed yet.</div>' :
                          orders.map(o => `
                            <div class="bg-gray-900 border border-gray-800 rounded-3xl p-4 space-y-2.5">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-bold text-white">${o.productName} (${o.plan})</span>
                                    <span class="text-[10px] font-bold px-2.5 py-0.5 rounded-full ${o.status === 'approved' ? 'bg-green-950 text-green-400 border border-green-800' : 'bg-yellow-950 text-yellow-400 border border-yellow-800'} uppercase">${o.status}</span>
                                </div>
                                <div class="flex justify-between text-[11px] text-gray-400">
                                    <span>User: ${o.username} | Mode: ${o.paymentMode}</span>
                                    <span class="text-white font-bold">₹${o.price}</span>
                                </div>
                                ${o.key ? `
                                    <div class="bg-gray-950 p-2.5 rounded-2xl border border-gray-800 flex items-center justify-between gap-2">
                                        <span class="text-[11px] font-mono text-green-400 truncate">${o.key}</span>
                                        <button onclick="copyKey('${o.key}')" class="bg-gray-800 hover:bg-gray-700 text-white px-2.5 py-1 rounded-xl text-[10px] font-bold cursor-pointer">Copy</button>
                                    </div>
                                ` : '<p class="text-[10px] text-yellow-500/80 italic">Awaiting owner approval & key generation...</p>'}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        const renderFiles = () => {
            const files = CloudDB.getFiles();
            const isOwner = currentUser && currentUser.role === 'owner';

            return `
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-xs font-bold text-gray-300 uppercase tracking-wider">Download Panel Files & APKs (${files.length})</h2>
                            <p class="text-[10px] text-gray-500">Official panel builds & tools</p>
                        </div>
                        ${isOwner ? `
                            <button onclick="openAddFileModal()" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-md shadow-green-600/20 cursor-pointer">
                                <i class="fas fa-plus"></i> Upload File
                            </button>
                        ` : ''}
                    </div>

                    <div class="space-y-3">
                        ${files.length === 0 ? '<div class="text-center py-12 text-gray-500 text-xs bg-gray-900 border border-gray-800 rounded-3xl">No files available for download yet.</div>' :
                          files.map(f => `

        window.openModal = (htmlContent) => {

            backdrop.classList.remove('hidden');
            setTimeout(() => {
                box.classList.remove('translate-y-full', 'sm:scale-95');
                box.classList.add('translate-y-0', 'sm:scale-100');
            }, 10);
        };

        window.closeModal = () => {
            const backdrop = document.getElementById('modal-backdrop');
            const box = document.getElementById('modal-box');
            if(!backdrop || !box) return;
            box.classList.add('translate-y-full', 'sm:scale-95');
            setTimeout(() => {
                backdrop.classList.add('hidden');
                box.innerHTML = '';
            }, 200);

        window.login = () => {
            const uInput = document.getElementById('auth-username');

            const uname = uInput.value.trim();
            const pass = pInput.value.trim();

            if(!uname || !pass) {
                showToast('Please fill in both username and password', 'error');
                return;
            }

            const usersList = CloudDB.getUsers() || [];
            const found = usersList.find(u => u.username && u.username.toLowerCase() === uname.toLowerCase() && u.password === pass);
            if(found) {
                currentUser = found;
                currentTab = 'store';

        window.applyCoupon = () => {
            const codeInput = document.getElementById('checkout-coupon');

            const code = codeInput.value.trim().toUpperCase();
            const coupons = CloudDB.getCoupons();
            const found = coupons.find(c => c.code === code);
            if(found) {
                appliedCoupon = found;
                const plan = selectedProduct.plans[selectedPlanIndex];
                const basePrice = currentUser.role === 'reseller' ? plan.resellerPrice : plan.price;
                const final = Math.round(basePrice * (1 - found.discount / 100));
                const display = document.getElementById('final-price-display');
                if(display) display.innerText = '₹' + final + ' (' + found.discount + '% OFF)';
                window.showToast('Coupon applied! ' + found.discount + '% off', 'success');
            } else {
                window.showToast('Invalid coupon code', 'error');
            }
        };

        window.confirmPurchaseWallet = async () => {
            if(!selectedProduct) return;
            const plan = selectedProduct.plans[selectedPlanIndex];
            let price = currentUser.role === 'reseller' ? plan.resellerPrice : plan.price;
            if(appliedCoupon) {
                price = Math.round(price * (1 - appliedCoupon.discount / 100));
            }

            if(currentUser.balance < price) {
                closeModal();
                window.showToast('Insufficient wallet balance! Please add funds via UPI.', 'error');
                showAddBalanceModal();
                return;
            }

            const users = CloudDB.getUsers();
            const u = users.find(x => x.id === currentUser.id);
            if(u) {
                u.balance -= price;
                await CloudDB.updateUsers(users);
                currentUser = u;
            }

            const newOrder = {
                id: generateId(),
                userId: currentUser.id,
                username: currentUser.username,
                productName: selectedProduct.name,
                plan: plan.duration,
                price,
                paymentMode: 'Wallet',
                utr: 'WALLET_DEDUCT',
                status: 'pending',
                date: new Date().toISOString()
            };

            const utrInput = document.getElementById('add-bal-utr');

                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm"><i class="fas fa-tags text-purple-400 mr-2"></i> Manage Coupons</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1 cursor-pointer"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-4 overflow-y-auto max-h-[75vh]">
                    <div class="bg-gray-950 border border-gray-800 p-4 rounded-2xl space-y-3">
                        <h4 class="font-bold text-white text-xs">Create Discount Coupon</h4>
                        <div class="flex gap-2">
                            <input type="text" id="new-coup-code" class="flex-1 bg-gray-900 border border-gray-800 rounded-xl px-3 py-2 text-xs text-white uppercase font-bold" placeholder="CODE">
                            <input type="number" id="new-coup-disc" class="w-20 bg-gray-900 border border-gray-800 rounded-xl px-3 py-2 text-xs text-white" placeholder="% Off">
                            <button onclick="createCoupon()" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-xl text-xs font-bold cursor-pointer">Add</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${coupons.map(c => `
                            <div class="flex justify-between items-center bg-gray-950 p-3 rounded-xl border border-gray-800">
                                <div><span class="font-mono text-white text-xs font-bold">${c.code}</span><span class="text-purple-400 ml-2 text-xs font-semibold">${c.discount}% OFF</span></div>
                                <button onclick="deleteCoupon('${c.id}')" class="text-red-400 hover:text-red-300 text-xs font-bold cursor-pointer"><i class="fas fa-trash"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `);
        };

        window.createCoupon = async () => {
            const codeInput = document.getElementById('new-coup-code');
            const discInput = document.getElementById('new-coup-disc');
            if(!codeInput || !discInput) return;
            const code = codeInput.value.trim().toUpperCase();
            const discount = parseFloat(discInput.value);

            if(!code || isNaN(discount)) return showToast('Please enter coupon code and discount percentage', 'error');

            await CloudDB.addCoupon({
                id: generateId(),
                code,
                discount
            });
            openCouponsModal();
            showToast('Coupon created successfully!', 'success');
        };

        window.deleteCoupon = async (id) => {
            await CloudDB.deleteCoupon(id);
            openCouponsModal();
            showToast('Coupon deleted', 'success');
        };

        window.openAnnouncementsModal = () => {
            const announcements = CloudDB.getAnnouncements();
            window.openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm"><i class="fas fa-bullhorn text-yellow-400 mr-2"></i> Manage Announcements</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1 cursor-pointer"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-4 overflow-y-auto max-h-[75vh]">
                    <div class="bg-gray-950 border border-gray-800 p-4 rounded-2xl space-y-3">
                        <h4 class="font-bold text-white text-xs">Add New Announcement</h4>
                        <textarea id="new-ann-text" class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-yellow-500" placeholder="Type store announcement or updates here..." rows="3"></textarea>
                        <button onclick="createAnnouncement()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white py-3 rounded-xl text-xs font-bold uppercase tracking-wider shadow-lg shadow-yellow-600/20 cursor-pointer">Publish Announcement</button>
                    </div>
                    <div class="space-y-2.5">
                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Active Broadcasts (${announcements.length})</h4>
                        ${announcements.length === 0 ? '<p class="text-xs text-gray-500 italic">No announcements currently published.</p>':
                          announcements.map(a => `
                            <div class="flex items-start justify-between bg-gray-950 p-3.5 rounded-2xl border border-gray-800 gap-3">
                                <div class="flex-1 space-y-1">
                                    <p class="text-xs text-white font-medium">${a.text}</p>
                                    <span class="text-[9px] text-gray-500">${a.date}</span>
                                </div>
                                <button onclick="deleteAnnouncement('${a.id}')" class="text-red-400 hover:text-red-300 p-2 text-xs font-bold cursor-pointer"><i class="fas fa-trash"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `);
        };

        window.createAnnouncement = async () => {
            const input = document.getElementById('new-ann-text');
            if(!input) return;
            const text = input.value.trim();
            if(!text) return showToast('Announcement text cannot be empty', 'error');

            await CloudDB.addAnnouncement({
                id: generateId(),
                text,
                date: new Date().toLocaleDateString()
            });
            openAnnouncementsModal();
            showToast('Announcement published successfully!', 'success');
        };

        window.deleteAnnouncement = async (id) => {
            await CloudDB.deleteAnnouncement(id);
            openAnnouncementsModal();
            showToast('Announcement deleted', 'success');
        };

        window.openUserRoleModal = () => {
            const users = CloudDB.getUsers();
            window.openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm"><i class="fas fa-users-cog text-yellow-400 mr-2"></i> Manage User Accounts</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1 cursor-pointer"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-3 overflow-y-auto max-h-[75vh]">
                    ${users.map(u => `
                        <div class="bg-gray-950 border border-gray-800 p-3.5 rounded-2xl space-y-2">
                            <div class="flex justify-between items-center">
                                <div><span class="font-bold text-white text-xs">${u.username}</span><span class="text-[10px] text-gray-400 ml-2 uppercase">(${u.role})</span></div>
                                <span class="text-xs font-bold text-green-400">₹${u.balance}</span>
                            </div>
                            <div class="flex gap-2 pt-1 flex-wrap">
                                <button onclick="adjustUserBalance('${u.id}', 100)" class="bg-gray-900 text-green-400 border border-gray-800 px-2.5 py-1.5 rounded-lg text-[10px] font-bold cursor-pointer">+₹100</button>
                                <button onclick="adjustUserBalance('${u.id}', 500)" class="bg-gray-900 text-green-400 border border-gray-800 px-2.5 py-1.5 rounded-lg text-[10px] font-bold cursor-pointer">+₹500</button>
                                <button onclick="openChangePasswordModal('${u.id}')" class="bg-gray-900 text-purple-400 border border-gray-800 px-2.5 py-1.5 rounded-lg text-[10px] font-bold cursor-pointer">Change Pass</button>
                                <button onclick="deleteUserAccount('${u.id}')" class="bg-gray-900 text-red-400 border border-gray-800 px-2.5 py-1.5 rounded-lg text-[10px] font-bold ml-auto cursor-pointer"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `);
        };

        window.adjustUserBalance = async (userId, amt) => {
            const users = CloudDB.getUsers();
            const u = users.find(x => x.id === userId);
            if(u) {
                u.balance += amt;
                await CloudDB.updateUsers(users);
                openUserRoleModal();
                showToast('Balance updated for ' + u.username, 'success');
            }
        };

        window.openChangePasswordModal = (userId) => {
            const users = CloudDB.getUsers();
            const u = users.find(x => x.id === userId);
            if(!u) return;

            window.openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm">Change Password for ${u.username}</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1 cursor-pointer"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">New Password</label>
                        <input type="text" id="new-user-pass" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-xs" placeholder="Enter new password">
                    </div>
                    <button onclick="saveNewUserPassword('${u.id}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider cursor-pointer">Update Password</button>
                </div>
            `);
        };

        window.saveNewUserPassword = async (userId) => {
            const passInput = document.getElementById('new-user-pass');
            if(!passInput) return;
            const newPass = passInput.value.trim();
            if(!newPass) return showToast('Password cannot be empty', 'error');

            const users = CloudDB.getUsers();
            const u = users.find(x => x.id === userId);
            if(u) {
                u.password = newPass;
                await CloudDB.updateUsers(users);
                openUserRoleModal();
                showToast('Password updated successfully for ' + u.username, 'success');
            }
        };

        window.deleteUserAccount = async (userId) => {
            let users = CloudDB.getUsers();
            const u = users.find(x => x.id === userId);
            if(u && u.role === 'owner') {
                return showToast('Cannot delete master owner account', 'error');
            }
            users = users.filter(x => x.id !== userId);
            await CloudDB.updateUsers(users);
            openUserRoleModal();
            showToast('Account deleted successfully', 'success');
        };

        window.openApprovalsModal = () => {
            const orders = CloudDB.getOrders().filter(o => o.status === 'pending');
            const balanceReqs = CloudDB.getBalanceReqs().filter(r => r.status === 'pending');

            window.openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm"><i class="fas fa-clipboard-check text-red-400 mr-2"></i> Pending Orders & Approvals</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1 cursor-pointer"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-6 overflow-y-auto max-h-[75vh]">
                    <div class="space-y-3">
                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Pending Product Orders (${orders.length})</h4>
                        ${orders.length === 0 ? '<p class="text-xs text-gray-500 italic">No pending product orders.</p>' :
                          orders.map(o => `
                            <div class="bg-gray-950 border border-gray-800 p-3.5 rounded-2xl space-y-2">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-white text-xs">${o.productName} (${o.plan})</span>
                                    <span class="text-[10px] text-green-400 font-bold">₹${o.price}</span>
                                </div>
                                <div class="text-[11px] text-gray-400 flex justify-between">
                                    <span>User: <b>${o.username}</b></span>
                                    <span>Mode: ${o.paymentMode}</span>
                                </div>
                                ${o.utr && o.utr !== 'WALLET_DEDUCT' ? `<div class="bg-gray-900 p-2 rounded-xl text-[11px] font-mono text-yellow-400">UTR Verification: ${o.utr}</div>` : ''}
                                <div class="space-y-2 pt-1">
                                    <input type="text" id="key-input-${o.id}" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3 py-2 text-white text-xs font-mono" placeholder="Type license key to send...">
                                    <div class="flex gap-2">
                                        <button onclick="approveOrder('${o.id}')" class="flex-1 bg-green-600 hover:bg-green-500 text-white py-2 rounded-xl text-xs font-bold uppercase tracking-wider cursor-pointer">Approve & Send</button>
                                        <button onclick="rejectOrder('${o.id}')" class="bg-red-600 hover:bg-red-500 text-white px-3 py-2 rounded-xl text-xs font-bold uppercase tracking-wider cursor-pointer">Reject</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="space-y-3 border-t border-gray-800 pt-4">
                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Pending Balance Requests (${balanceReqs.length})</h4>
                        ${balanceReqs.length === 0 ? '<p class="text-xs text-gray-500 italic">No pending balance requests.</p>' :
                          balanceReqs.map(r => `
                            <div class="bg-gray-950 border border-gray-800 p-3.5 rounded-2xl space-y-2">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-white text-xs">User: ${r.username}</span>
                                    <span class="text-xs font-bold text-green-400">+₹${r.amount}</span>
                                </div>
                                <div class="bg-gray-900 p-2 rounded-xl text-[11px] font-mono text-yellow-400">UTR: ${r.utr}</div>
                                <div class="flex gap-2 pt-1">
                                    <button onclick="approveBalanceReq('${r.id}')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-xl text-xs font-bold uppercase tracking-wider cursor-pointer">Verify & Add Balance</button>
                                    <button onclick="rejectBalanceReq('${r.id}')" class="bg-red-600 hover:bg-red-500 text-white px-3 py-2 rounded-xl text-xs font-bold uppercase tracking-wider cursor-pointer">Reject</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `);
        };

        window.approveOrder = async (orderId) => {
            const keyInput = document.getElementById('key-input-' + orderId);
            if(!keyInput) return;
            const key = keyInput.value.trim();
            if(!key) return showToast('Please enter license key to dispatch', 'error');

            await CloudDB.updateOrder(orderId, {
                status: 'approved',
                key
            });
            openApprovalsModal();
            showToast('Order approved and key dispatched!', 'success');
        };

        window.rejectOrder = async (orderId) => {
            const orders = CloudDB.getOrders();
            const o = orders.find(x => x.id === orderId);
            if(o && o.paymentMode === 'Wallet') {
                const users = CloudDB.getUsers();
                const u = users.find(x => x.id === o.userId);
                if(u) {
                    u.balance += o.price;
                    await CloudDB.updateUsers(users);
                }
            }
            await CloudDB.updateOrder(orderId, { status: 'rejected' });
            openApprovalsModal();
            showToast('Order rejected', 'success');
        };

        window.approveBalanceReq = async (reqId) => {
            const reqs = CloudDB.getBalanceReqs();
            const r = reqs.find(x => x.id === reqId);
            if(!r) return;

            const users = CloudDB.getUsers();
            const u = users.find(x => x.id === r.userId);
            if(u) {
                u.balance += r.amount;
                await CloudDB.updateUsers(users);
            }

            await CloudDB.updateBalanceReq(reqId, { status: 'approved' });
            openApprovalsModal();
            showToast('Balance added to user wallet successfully!', 'success');
        };

        window.rejectBalanceReq = async (reqId) => {
            await CloudDB.updateBalanceReq(reqId, { status: 'rejected' });
            openApprovalsModal();
            showToast('Balance request rejected', 'success');
        };

        window.openStatusAnalysisModal = () => {
            const orders = CloudDB.getOrders();
            const users = CloudDB.getUsers();
            const totalSales = orders.filter(o => o.status === 'approved').reduce((acc, curr) => acc + curr.price, 0);

            window.openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm"><i class="fas fa-chart-line text-emerald-400 mr-2"></i> Status Analysis & Reports</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1 cursor-pointer"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-4 overflow-y-auto max-h-[75vh]">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-gray-950 p-4 rounded-2xl border border-gray-800">
                            <span class="text-[10px] text-gray-400 uppercase font-bold block">Total Revenue</span>
                            <span class="text-base font-black text-green-400">₹${totalSales}</span>
                        </div>
                        <div class="bg-gray-950 p-4 rounded-2xl border border-gray-800">
                            <span class="text-[10px] text-gray-400 uppercase font-bold block">Total Users</span>
                            <span class="text-base font-black text-blue-400">${users.length}</span>
                        </div>
                        <div class="bg-gray-950 p-4 rounded-2xl border border-gray-800">
                            <span class="text-[10px] text-gray-400 uppercase font-bold block">Total Orders</span>
                            <span class="text-base font-black text-white">${orders.length}</span>
                        </div>
                        <div class="bg-gray-950 p-4 rounded-2xl border border-gray-800">
                            <span class="text-[10px] text-gray-400 uppercase font-bold block">Pending Orders</span>
                            <span class="text-base font-black text-yellow-400">${orders.filter(o => o.status === 'pending').length}</span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider cursor-pointer">Close Analysis</button>
                </div>
            `);
        };

        window.openAdminSettingsModal = () => {
            const settings = CloudDB.getSettings();
            window.openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm"><i class="fas fa-cog text-indigo-400 mr-2"></i> Store Configuration</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1 cursor-pointer"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Store UPI ID</label>
                        <input type="text" id="admin-upi-id" value="${settings.upiId}" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-xs font-mono">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Support Telegram / Info Text</label>
                        <input type="text" id="admin-support-text" value="${settings.supportText || ''}" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-xs">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Store Logo / Profile Picture URL</label>
                        <input type="text" id="admin-store-logo" value="${settings.storeLogo || ''}" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-xs" placeholder="https://example.com/logo.png">
                    </div>
                    <button onclick="saveAdminSettings()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider cursor-pointer">Save Settings</button>
                </div>
            `);
        };

        window.saveAdminSettings = async () => {
            const upiId = document.getElementById('admin-upi-id').value.trim();
            const supportText = document.getElementById('admin-support-text').value.trim();
            const storeLogo = document.getElementById('admin-store-logo').value.trim();

            if(!upiId) return showToast('UPI ID cannot be empty', 'error');

            await CloudDB.updateSettings({ upiId, supportText, storeLogo });
            closeModal();
            showToast('Store settings updated successfully!', 'success');
        };

        window.onload = () => {
            initCloud();
        };
    </script>
</body>
</html>
